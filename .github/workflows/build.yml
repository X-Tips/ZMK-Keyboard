name: Build ZMK Firmware

on:
  workflow_dispatch:
    inputs:
      shield:
        description: '选择键盘 - select keyboard'
        required: true
        type: choice
        options:
          - p20n
          - p31n
          - p48n
          - x35n
          - x36n
          - x3n2
      board:
        description: '主控型号 - board model'
        required: true
        default: 'nrfmicro/nrf52840/zmk'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 调试：查看当前路径
      - name: Debug - check paths
        run: |
          echo "=== GITHUB_WORKSPACE ==="
          echo $GITHUB_WORKSPACE
          echo "=== 当前目录 ==="
          pwd
          echo "=== 列出 /__w 目录 ==="
          ls -la /__w/

      - name: Initialize west workspace
        run: |
          west init -l config/
          west update
          west zephyr-export

      - name: Link custom shields
        run: |
          mkdir -p $GITHUB_WORKSPACE/zmk/app/boards/shields/
          ln -sf $GITHUB_WORKSPACE/${{ github.event.inputs.shield }} $GITHUB_WORKSPACE/zmk/app/boards/shields/${{ github.event.inputs.shield }}

      - name: Build firmware
        run: |
          west build -s zmk/app -b ${{ github.event.inputs.board }} -d build \
            -S studio-rpc-usb-uart \
            -- -DSHIELD=${{ github.event.inputs.shield }} -DCONFIG_ZMK_STUDIO=y

      - name: Set safe name
        run: |
          SAFE_NAME=$(echo "${{ github.event.inputs.shield }}-${{ github.event.inputs.board }}" | tr '/' '_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SAFE_NAME }}
          path: build/zephyr/zmk.uf2